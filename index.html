<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblingo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone">
        <div class="roblingo">
            <div class="dynamic-island"></div>

            <section class="screen active" id="homeScreen">
                <header class="app-header">
                    <p class="for-her">For Marina</p>
                    <h1>Roblingo</h1>
                    <p>British Accent Practice</p>

                    <div class="parrot-wrap">
                        <img src="./parrot.png" alt="Roblingo parrot" class="parrot-mascot" id="parrotMascot">
                    </div>

                    <div class="version-pill">Version 2</div>

                    <div class="stats-wrap">
                        <div class="streak-box">
                            <span>🔥</span>
                            <span id="streakCount">0</span>
                            <span>day streak</span>
                        </div>

                        <div class="xp-box">
                            <div class="xp-top">
                                <span>XP</span>
                                <span id="xpText">0 / 100</span>
                            </div>
                            <div class="xp-bar">
                                <div class="xp-fill" id="xpFill"></div>
                            </div>
                        </div>
                    </div>
                </header>

                <main class="lesson-list" id="lessonList"></main>
            </section>

            <section class="screen" id="lessonScreen">
                <div class="top-row">
                    <button class="icon-btn" id="backBtn" type="button">←</button>
                </div> 

                <div class="lesson-body">
                    <p class="lesson-tag" id="lessonTag">Lesson 1</p>
                    <h2 class="main-word" id="mainWord">Water</h2>
                    <p class="subtext" id="lessonSubtext">Compare the casual and polite pronunciation.</p>

                    <div class="audio-buttons">
                        <button class="audio-btn" id="casualBtn" type="button">
                            <span class="audio-title">🔊 Casual</span>
                            <span class="audio-note" id="casualNote">water</span>
                        </button>

                        <button class="audio-btn" id="politeBtn" type="button">
                            <span class="audio-title">🔊 Polite</span>
                            <span class="audio-note" id="politeNote">Water</span>
                        </button>
                    </div>

                    <button class="mic-btn" id="micBtn" type="button">🎤 Tap to Speak</button>

                    <p class="recording-status" id="recordingStatus">
                        Tap a pronunciation, then record yourself.
                    </p>

                    <div id="recordingPlayerWrap" class="recording-player-wrap"></div>

                    <button class="complete-btn" id="completeBtn" type="button">Complete Lesson</button>
                </div>
            </section>

            <div class="success-overlay" id="successOverlay">
                <div class="success-card">
                    <img src="./parrot.png" alt="Roblingo parrot" class="success-parrot" id="successParrot">
                    <div class="success-icon">✓</div>
                    <h3 id="successTitle">Nice one</h3>
                    <p id="successText">Lesson complete</p>
                </div>
            </div>

            <div class="home-bar"></div>
        </div>
    </div>



    <script src="script.js"></script>
</body>
</html>
